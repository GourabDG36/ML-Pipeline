services:

  mlflow:
    image: python:3.11-slim
    container_name: mlflow-server
    working_dir: /mlflow
    volumes:
      - mlflow-data:/mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_HOST=0.0.0.0
      - MLFLOW_PORT=5000
      - GUNICORN_CMD_ARGS=--bind=0.0.0.0:5000
    command: >
      sh -c "pip install mlflow==2.13.0 gunicorn -q &&
             mlflow server
             --host 0.0.0.0
             --port 5000
             --backend-store-uri sqlite:///mlflow.db
             --default-artifact-root /mlflow/artifacts"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi-backend
    ports:
      - "8000:8000"
    volumes:
      - upload-data:/app/data/uploads
      - ./backend/data/sample:/app/data/sample
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=ml-pipeline
      - REGISTERED_MODEL_NAME=best-classifier
      - OPTUNA_TRIALS=5
      - RANDOM_SEED=42
      - DEBUG=false
    depends_on:
      - mlflow
    restart: unless-stopped

volumes:
  mlflow-data:
  upload-data: