name: Retrain on New Data

on:
  push:
    paths:
      - "data/sample/**.csv"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.docker.txt

      - name: List files
        working-directory: backend
        run: |
          pwd
          ls -la scripts/

      - name: Run retraining script
        working-directory: backend
        run: python scripts/retrain.py
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
          MLFLOW_EXPERIMENT_NAME: ml-pipeline
          REGISTERED_MODEL_NAME: best-classifier
          OPTUNA_TRIALS: "5"
          RANDOM_SEED: "42"

      - name: Upload training report
        uses: actions/upload-artifact@v4
        with:
          name: training-report
          path: backend/training_report.json